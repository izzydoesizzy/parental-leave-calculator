<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Parental Leave Calculator for Canada (2026). Model EI and QPIP benefits, employer top-ups, and leave-splitting scenarios to maximize your family's income.">
    <title>Parental Leave Calculator — Canada</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0;padding:0">
    <div id="root"></div>
    <script type="text/babel">
const { useState, useMemo, useEffect } = React;

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const EI = { mie: 68900, stdRate: 0.55, extRate: 0.33, maxStd: 729, maxExt: 437, matWk: 15, stdTotal: 40, stdMax1: 35, stdBonus: 5, extTotal: 69, extMax1: 61, extBonus: 8 };
const QPIP = {
  mie: 103000,
  basic: { matWk: 18, matR: 0.70, patWk: 5, patR: 0.70, parWk: 28, parR1: 0.70, parN1: 7, parR2: 0.55, parN2: 21, bonusWk: 4, bonusR: 0.55 },
  special: { matWk: 15, matR: 0.75, patWk: 3, patR: 0.75, parWk: 25, parR: 0.75, bonusWk: 3, bonusR: 0.75 },
};
const PROVS = [
  { c: "ON", n: "Ontario", mJP: 17, pJP: 63, q: false }, { c: "BC", n: "British Columbia", mJP: 17, pJP: 62, q: false },
  { c: "AB", n: "Alberta", mJP: 16, pJP: 62, q: false }, { c: "SK", n: "Saskatchewan", mJP: 19, pJP: 63, q: false },
  { c: "MB", n: "Manitoba", mJP: 17, pJP: 63, q: false }, { c: "QC", n: "Quebec (QPIP)", mJP: 18, pJP: 65, q: true },
  { c: "NB", n: "New Brunswick", mJP: 17, pJP: 63, q: false }, { c: "NS", n: "Nova Scotia", mJP: 17, pJP: 63, q: false },
  { c: "PE", n: "Prince Edward Island", mJP: 17, pJP: 63, q: false }, { c: "NL", n: "Newfoundland", mJP: 17, pJP: 63, q: false },
  { c: "FED", n: "Federal (banks, telecom)", mJP: 17, pJP: 63, q: false },
];
const TOPUP_PCTS = [75, 80, 93, 95, 100];
const TOPUP_DUR_MAT = [15, 17, 18];
const TOPUP_DUR_PAR = [12, 17, 26, 35];

const fmt = n => new Intl.NumberFormat("en-CA", { style: "currency", currency: "CAD", maximumFractionDigits: 0 }).format(n);
const wkEI = (sal, rate, max) => Math.min((Math.min(sal, EI.mie) / 52) * rate, max);
const wkQP = (sal, rate) => (Math.min(sal, QPIP.mie) / 52) * rate;
const topUpDiff = (sal, pct, ben) => Math.max(0, (sal / 52) * (pct / 100) - ben);

// ─── CALC ENGINE ─────────────────────────────────────────────────────────────
function calc(bp, op, type, qPlan, bpPW, opPW) {
  const isQ = bp.prov.q || op.prov.q, isStd = type === "standard";
  let r = { bp: { wks: [], ben: 0, top: 0, tot: 0 }, op: { wks: [], ben: 0, top: 0, tot: 0 }, fam: 0, gap: 0, warn: [] };
  const push = (arr, t, b, tu) => arr.push({ t, b, tu, tot: b + tu });

  if (!isQ) {
    const rate = isStd ? EI.stdRate : EI.extRate, max = isStd ? EI.maxStd : EI.maxExt;
    const bpMat = wkEI(bp.sal, EI.stdRate, EI.maxStd), bpPar = wkEI(bp.sal, rate, max), opPar = wkEI(op.sal, rate, max);
    for (let i = 0; i < EI.matWk; i++) push(r.bp.wks, "Maternity", bpMat, bp.hasMT && i < bp.mtW ? topUpDiff(bp.sal, bp.mtP, bpMat) : 0);
    for (let i = 0; i < bpPW; i++) push(r.bp.wks, "Parental", bpPar, bp.hasPT && i < bp.ptW ? topUpDiff(bp.sal, bp.ptP, bpPar) : 0);
    for (let i = 0; i < opPW; i++) push(r.op.wks, "Parental", opPar, op.hasT && i < op.tW ? topUpDiff(op.sal, op.tP, opPar) : 0);
  } else {
    const pl = qPlan === "basic" ? QPIP.basic : QPIP.special;
    for (let i = 0; i < pl.matWk; i++) { const w = wkQP(bp.sal, pl.matR); push(r.bp.wks, "Mat(QPIP)", w, bp.hasMT && i < bp.mtW ? topUpDiff(bp.sal, bp.mtP, w) : 0); }
    for (let i = 0; i < pl.patWk; i++) { const w = wkQP(op.sal, pl.patR); push(r.op.wks, "Pat(QPIP)", w, op.hasT && i < op.tW ? topUpDiff(op.sal, op.tP, w) : 0); }
    if (qPlan === "basic") {
      let bc = Math.min(bpPW, pl.parWk), oc = Math.min(opPW, pl.parWk - bc);
      for (let i = 0; i < bc; i++) { const rt = i < pl.parN1 ? pl.parR1 : pl.parR2; const w = wkQP(bp.sal, rt); push(r.bp.wks, "Par(QPIP)", w, bp.hasPT && i < bp.ptW ? topUpDiff(bp.sal, bp.ptP, w) : 0); }
      for (let i = 0; i < oc; i++) { const rt = (bc + i) < pl.parN1 ? pl.parR1 : pl.parR2; const w = wkQP(op.sal, rt); push(r.op.wks, "Par(QPIP)", w, op.hasT && (pl.patWk + i) < op.tW ? topUpDiff(op.sal, op.tP, w) : 0); }
      // Sharing bonus: 4 extra weeks at 55% if both parents take 8+ shareable weeks
      if (bc >= 8 && oc >= 8) {
        const bonusPerParent = 2; // 4 bonus weeks split evenly
        for (let i = 0; i < bonusPerParent; i++) { const w = wkQP(bp.sal, pl.parR2); push(r.bp.wks, "Bonus(QPIP)", w, 0); }
        for (let i = 0; i < bonusPerParent; i++) { const w = wkQP(op.sal, pl.parR2); push(r.op.wks, "Bonus(QPIP)", w, 0); }
      }
    } else {
      let bc = Math.min(bpPW, pl.parWk), oc = Math.min(opPW, pl.parWk - bc);
      for (let i = 0; i < bc; i++) { const w = wkQP(bp.sal, pl.parR); push(r.bp.wks, "Par(QPIP)", w, bp.hasPT && i < bp.ptW ? topUpDiff(bp.sal, bp.ptP, w) : 0); }
      for (let i = 0; i < oc; i++) { const w = wkQP(op.sal, pl.parR); push(r.op.wks, "Par(QPIP)", w, op.hasT && (pl.patWk + i) < op.tW ? topUpDiff(op.sal, op.tP, w) : 0); }
      // Sharing bonus: 3 extra weeks at 75% if both parents take 6+ shareable weeks
      if (bc >= 6 && oc >= 6) {
        const w1 = wkQP(bp.sal, pl.parR), w2 = wkQP(op.sal, pl.parR);
        push(r.bp.wks, "Bonus(QPIP)", w1, 0); push(r.bp.wks, "Bonus(QPIP)", w1, 0);
        push(r.op.wks, "Bonus(QPIP)", w2, 0);
      }
    }
  }
  [r.bp, r.op].forEach(p => { p.ben = p.wks.reduce((s, w) => s + w.b, 0); p.top = p.wks.reduce((s, w) => s + w.tu, 0); p.tot = p.ben + p.top; });
  r.fam = r.bp.tot + r.op.tot;
  const tw = Math.max(r.bp.wks.length, r.op.wks.length);
  r.gap = ((bp.sal + op.sal) / 52) * tw - r.fam;
  if (!isQ) {
    const mx = isStd ? EI.stdMax1 : EI.extMax1, tot = isStd ? EI.stdTotal : EI.extTotal;
    if (bpPW > mx) r.warn.push(`Birthing parent exceeds ${mx}-week max.`);
    if (opPW > mx) r.warn.push(`Other parent exceeds ${mx}-week max.`);
    if (bpPW + opPW > tot) r.warn.push(`Combined weeks exceed ${tot}-week pool.`);
  }
  return r;
}

// ─── REFERENCES ──────────────────────────────────────────────────────────────
const REFS = {
  ei_rates: { t: "Canada.ca \u2013 EI Benefit Amounts", u: "https://www.canada.ca/en/services/benefits/ei/ei-maternity-parental/benefit-amount.html" },
  ei_self: { t: "Canada.ca \u2013 EI for Self-Employed", u: "https://www.canada.ca/en/services/benefits/ei/ei-self-employed-workers.html" },
  ei_sub: { t: "Canada.ca \u2013 Supplementing Benefits", u: "https://www.canada.ca/en/employment-social-development/programs/ei/ei-list/ei-employers-maternity-parental-benefits.html" },
  ei_digest: { t: "Canada.ca \u2013 Digest Ch.13", u: "https://www.canada.ca/en/employment-social-development/programs/ei/ei-list/reports/digest/chapter-13/parental-benefits-payments.html" },
  on_esa: { t: "Ontario.ca \u2013 Pregnancy & Parental Leave", u: "https://www.ontario.ca/document/your-guide-employment-standards-act-0/pregnancy-and-parental-leave" },
  qpip: { t: "QPIP \u2013 Features", u: "https://www.rqap.gouv.qc.ca/en/about-the-plan/general-information/features" },
  ccb: { t: "Canada.ca \u2013 Canada Child Benefit", u: "https://www.canada.ca/en/revenue-agency/services/child-family-benefits/canada-child-benefit/how-much.html" },
  statscan: { t: "Statistics Canada \u2013 Parental Leave 1997\u20132022", u: "https://www150.statcan.gc.ca/n1/pub/14-28-0001/2023001/article/00009-eng.htm" },
  workzoom: { t: "Workzoom \u2013 Parental Leave 2026", u: "https://www.workzoom.com/blog/parental-leave-canada-2026-employer-guide/" },
  benefits_survey: { t: "Benefits Canada \u2013 Top-Up Survey", u: "https://www.benefitscanada.com/benefits/absence-management/more-canadian-employers-topping-up-maternity-leave-than-parental-leave-survey/" },
  cbc_layoff: { t: "CBC \u2013 Mom denied EI (Jan 2026)", u: "https://www.cbc.ca/news/canada/montreal/quebec-mother-denied-ei-benefits-after-maternity-and-parental-leave-9.7053440" },
  ywca: { t: "YWCA \u2013 Sharing Leave Benefits", u: "https://ywcavan.org/blog/2020/03/benefits-sharing-parental-leave" },
  cfib: { t: "CFIB \u2013 EI Self-Employed", u: "https://www.cfib-fcei.ca/en/tools-resources/ei-when-youre-self-employed" },
  topup_rules: { t: "Whitten & Lublin \u2013 Top-Up Rules", u: "https://toronto-employmentlawyer.com/blog/employment-contracts/top-up-maternity-leave/" },
  tax_plan: { t: "TaxTool.ca \u2013 Tax Planning", u: "https://taxtool.ca/tax-planning-for-maternity-and-parental-leaves/" },
};

function getRecs(bp, op, type, isQ, result, bpPW, opPW) {
  const recs = [], isStd = type === "standard";
  const rate = isStd ? EI.stdRate : EI.extRate, max = isStd ? EI.maxStd : EI.maxExt;
  const mxPP = isStd ? EI.stdMax1 : EI.extMax1;
  const totP = isStd ? EI.stdTotal : EI.extTotal;
  const bpLoss = bp.sal / 52 - wkEI(bp.sal, rate, max), opLoss = op.sal / 52 - wkEI(op.sal, rate, max);

  // Salary differential — suggest lower earner take more, but only if they have room
  if (!isQ && Math.abs(bp.sal - op.sal) > 15000) {
    const higherIsOp = op.sal > bp.sal;
    const lowerLbl = higherIsOp ? "birthing parent" : "other parent";
    const higherLbl = higherIsOp ? "other parent" : "birthing parent";
    const hasTopUp = higherIsOp ? (op.hasT && op.tP > 0) : (bp.hasPT && bp.ptP > 0);
    const lowerCurrentWks = higherIsOp ? bpPW : opPW;
    const lowerMaxWks = mxPP;
    const roomToShift = Math.min(5, lowerMaxWks - lowerCurrentWks, higherIsOp ? opPW : bpPW);
    if (!hasTopUp && roomToShift > 0) {
      const sv = Math.round(Math.abs(bpLoss - opLoss));
      if (sv > 100) recs.push({ tp: "opt", icon: "\uD83D\uDCB0", title: `Consider having the ${lowerLbl} take more parental weeks`,
        body: `The ${higherLbl} earns ${fmt(Math.abs(bp.sal - op.sal))} more/yr. Without a top-up, each week they're on leave costs ~${fmt(sv)} more than the ${lowerLbl}. There's room to shift up to ${roomToShift} weeks, saving ~${fmt(sv * roomToShift)}.`, ref: REFS.ei_rates });
    }
  }
  const bpGood = (bp.hasMT && bp.mtP >= 80) || (bp.hasPT && bp.ptP >= 80), opGood = op.hasT && op.tP >= 80;
  if (bpGood && !opGood && opPW > 10 && bpPW < mxPP)
    recs.push({ tp: "opt", icon: "\uD83D\uDCCB", title: "Birthing parent's top-up covers more of the gap",
      body: `Their strong employer top-up makes their weeks cheaper for the family. They currently have ${mxPP - bpPW} more parental weeks available (max ${mxPP}). Consider having them take more, with the other parent taking fewer but still enough to trigger the ${isStd ? "5" : "8"}-week sharing bonus.`, ref: REFS.ei_sub });
  if (!bpGood && opGood && bpPW > 10 && opPW < mxPP)
    recs.push({ tp: "opt", icon: "\uD83D\uDCCB", title: "Other parent's top-up could save money",
      body: `Their employer top-up reduces the income gap. They currently have ${mxPP - opPW} more parental weeks available (max ${mxPP}). Shifting more weeks to them lowers total family income loss.`, ref: REFS.ei_sub });
  if (!isQ && (bpPW === 0 || opPW === 0)) {
    const bonus = isStd ? EI.stdBonus : EI.extBonus;
    recs.push({ tp: "warn", icon: "\u26A0\uFE0F", title: `You're leaving ${bonus} bonus weeks on the table`,
      body: `When both parents take parental leave, you unlock ${bonus} extra weeks. Even 5 weeks from the other parent triggers this "use-it-or-lose-it" provision. (Source: Canada.ca Digest Ch.13)`, ref: REFS.ei_digest });
  }
  if ((bp.selfEmp || op.selfEmp) && !isQ) {
    const who = bp.selfEmp && op.selfEmp ? "Both parents" : (bp.selfEmp ? "Birthing parent" : "Other parent");
    recs.push({ tp: "warn", icon: "\uD83D\uDEA8", title: `${who}: verify EI self-employed opt-in`,
      body: `Self-employed workers must opt into EI special benefits 12+ months before claiming. Need $8,826+ in prior-year net self-employment earnings. Benefits based on prior calendar year's income, not last 52 weeks. Once benefits are received, you cannot opt out \u2014 premiums are permanent. But a full 50 weeks of benefits covers ~30 years of premiums. (Sources: Canada.ca EI Self-Employed; CFIB; Stark & Marsh)`, ref: REFS.ei_self });
  }
  if ((bp.selfEmp || op.selfEmp) && isQ)
    recs.push({ tp: "pos", icon: "\u2705", title: "QPIP covers self-employed automatically",
      body: `Quebec's QPIP covers self-employed with just $2,000+ in earnings \u2014 no opt-in needed. Benefit rates are higher (70-75%) with $103,000 MIE vs federal EI's $68,900. (Source: QPIP Features)`, ref: REFS.qpip });
  if (!isQ && bp.sal > EI.mie && op.sal > EI.mie)
    recs.push({ tp: "info", icon: "\uD83D\uDCCA", title: "Both salaries exceed the EI cap",
      body: `Both earn above $${(EI.mie / 1000).toFixed(1)}K, so you'll both get the max benefit ($${max}/wk) regardless. Focus on top-ups and career impact rather than maximizing EI. (Source: Canada.ca EI Benefit Amounts)`, ref: REFS.ei_rates });
  if (bp.sal + op.sal > 80000)
    recs.push({ tp: "pos", icon: "\uD83D\uDC76", title: "Reduced income may boost your Canada Child Benefit",
      body: `CCB is recalculated every July based on prior-year family net income. Max is $7,997/yr per child under 6 for families with AFNI under $37,487. (Source: Canada.ca CCB)`, ref: REFS.ccb });
  if (bp.tenure === "<13wk")
    recs.push({ tp: "warn", icon: "\u23F0", title: "Birthing parent: tenure may be too short for job protection",
      body: `Most provinces require 13 weeks of employment before the due date. You may qualify for EI (600 insurable hours) but your job may not be protected. (Source: Ontario.ca ESA)`, ref: REFS.on_esa });
  return recs;
}

function RecCard({ rec }) {
  const bg = rec.tp === "warn" ? "#fef8f0" : rec.tp === "opt" ? "#f0f7f3" : rec.tp === "pos" ? "#f4f9f6" : "#f8f6f3";
  const bdr = rec.tp === "warn" ? "#f0d070" : "#8ac4a0";
  return (
    <div style={{ background: bg, border: `1px solid ${bdr}`, borderRadius: 14, padding: "16px 20px", marginBottom: 12 }}>
      <div style={{ fontSize: 15, fontWeight: 700, fontFamily: "var(--fd)", marginBottom: 6, color: "#2d2520" }}>{rec.icon} {rec.title}</div>
      <p style={{ fontSize: 13, lineHeight: 1.65, color: "#5c4f44", margin: 0 }}>{rec.body}</p>
      {rec.ref && <a href={rec.ref.u} target="_blank" rel="noopener noreferrer" style={{ fontSize: 11, color: "#a0937f", textDecoration: "underline", fontStyle: "italic", marginTop: 4, display: "inline-block" }}>{rec.ref.t}</a>}
    </div>
  );
}

// ─── SHARED STYLES ───────────────────────────────────────────────────────────
const S = {
  card: { background: "#fff", border: "1px solid #e6dfd6", borderRadius: 16, padding: "24px 28px", marginBottom: 20 },
  label: { fontSize: 13, color: "#7a6e62", display: "block", marginBottom: 6, fontWeight: 500 },
  select: { width: "100%", padding: "10px 14px", borderRadius: 10, border: "1px solid #ddd5cb", fontSize: 14, background: "#faf8f5", color: "#2d2520", fontFamily: "inherit", appearance: "auto" },
  hint: { fontSize: 12, color: "#a0937f", lineHeight: 1.5, marginTop: 4 },
  badge: (bg) => ({ display: "inline-block", padding: "3px 10px", borderRadius: 20, fontSize: 11, fontWeight: 700, background: bg, color: "#fff", letterSpacing: "0.03em" }),
};

// ─── SMALL COMPONENTS ────────────────────────────────────────────────────────
function Tip({ children }) {
  const [open, setOpen] = useState(false);
  return (
    <span style={{ position: "relative", display: "inline-block", marginLeft: 6, cursor: "pointer" }} onClick={() => setOpen(!open)} onMouseLeave={() => setOpen(false)}>
      <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 18, height: 18, borderRadius: "50%", background: "#ebe5dc", color: "#8a7d6e", fontSize: 11, fontWeight: 700 }}>?</span>
      {open && <div style={{ position: "absolute", bottom: 26, left: -100, width: 260, background: "#2d2520", color: "#e8ddd0", padding: "12px 16px", borderRadius: 12, fontSize: 12, lineHeight: 1.5, zIndex: 99, boxShadow: "0 8px 30px rgba(0,0,0,.2)" }}>{children}</div>}
    </span>
  );
}

function TopUpPicker({ hasTopUp, pct, weeks, onChange, label, context, salary }) {
  const durations = context === "maternity" ? TOPUP_DUR_MAT : TOPUP_DUR_PAR;
  const pillStyle = (active) => ({
    padding: "5px 12px", borderRadius: 20, fontSize: 12, fontWeight: 600,
    border: active ? "1.5px solid #2d2520" : "1px solid #ddd5cb",
    background: active ? "#2d2520" : "#faf8f5", color: active ? "#fff" : "#6b5e52",
    cursor: "pointer", transition: "all 0.15s", lineHeight: 1.3,
  });
  const toggleOn = () => onChange(true, 80, durations[Math.min(2, durations.length - 1)]);
  const weeklyTopUp = salary && pct > 0 ? Math.max(0, (salary / 52) * (pct / 100) - (Math.min(salary, EI.mie) / 52) * EI.stdRate) : 0;
  return (
    <div style={{ marginBottom: 16 }}>
      <label style={S.label}>{label}</label>
      <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, color: "#6b5e52", cursor: "pointer", marginBottom: hasTopUp ? 10 : 0 }}>
        <input type="checkbox" checked={hasTopUp} onChange={() => hasTopUp ? onChange(false, 0, 0) : toggleOn()} style={{ accentColor: "#c27840" }} />
        My employer offers a top-up
      </label>
      {hasTopUp && (
        <div style={{ background: "#faf8f5", borderRadius: 12, padding: "12px 14px", border: "1px solid #ebe5dc" }}>
          <div style={{ marginBottom: 10 }}>
            <div style={{ fontSize: 11, color: "#a0937f", marginBottom: 5, fontWeight: 500 }}>Top-up to % of salary</div>
            <div style={{ display: "flex", gap: 5, flexWrap: "wrap", alignItems: "center" }}>
              {TOPUP_PCTS.map(p => (
                <button key={p} onClick={() => onChange(true, p, weeks)} style={pillStyle(pct === p)}>{p}%</button>
              ))}
              <input type="number" min={50} max={100} value={pct} onChange={e => onChange(true, Math.min(100, Math.max(0, +e.target.value)), weeks)}
                style={{ width: 56, padding: "5px 8px", borderRadius: 8, border: "1px solid #ddd5cb", fontSize: 13, textAlign: "center" }} />
            </div>
          </div>
          <div style={{ marginBottom: salary ? 8 : 0 }}>
            <div style={{ fontSize: 11, color: "#a0937f", marginBottom: 5, fontWeight: 500 }}>For how many weeks</div>
            <div style={{ display: "flex", gap: 5, flexWrap: "wrap", alignItems: "center" }}>
              {durations.map(d => (
                <button key={d} onClick={() => onChange(true, pct, d)} style={pillStyle(weeks === d)}>{d}wk</button>
              ))}
              <input type="number" min={0} max={78} value={weeks} onChange={e => onChange(true, pct, Math.min(78, Math.max(0, +e.target.value)))}
                style={{ width: 56, padding: "5px 8px", borderRadius: 8, border: "1px solid #ddd5cb", fontSize: 13, textAlign: "center" }} />
            </div>
          </div>
          {salary > 0 && pct > 0 && weeks > 0 && (
            <div style={{ fontSize: 11, color: "#8a7d6e", marginTop: 6, fontStyle: "italic" }}>
              {"\u2248"} {fmt(weeklyTopUp)}/wk top-up on top of EI for {weeks} weeks ({fmt(weeklyTopUp * weeks)} total)
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function Slider({ val, set, min, max, step, label, accent, suffix }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
        <span style={{ fontSize: 13, color: "#7a6e62" }}>{label}</span>
        <span style={{ fontSize: 15, fontWeight: 700, color: "#2d2520", fontFamily: "var(--fd)" }}>{suffix === "$" ? fmt(val) : `${val} weeks`}</span>
      </div>
      <input type="range" min={min} max={max} step={step || 1} value={val} onChange={e => set(+e.target.value)} style={{ width: "100%", accentColor: accent || "#c27840" }} />
    </div>
  );
}

function Stat({ label, val, sub, color }) {
  return (
    <div style={{ textAlign: "center", padding: "10px 6px" }}>
      <div style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", color: "#9a8d80", marginBottom: 3 }}>{label}</div>
      <div style={{ fontSize: 24, fontWeight: 800, color: color || "#2d2520", fontFamily: "var(--fd)", lineHeight: 1.1 }}>{val}</div>
      {sub && <div style={{ fontSize: 11, color: "#a0937f", marginTop: 2 }}>{sub}</div>}
    </div>
  );
}

function Timeline({ r, weeklySalary }) {
  const mw = Math.max(r.bp.wks.length, r.op.wks.length, 1);
  const [hoverWeek, setHoverWeek] = useState(null);

  // Build combined weekly data
  const weeks = Array.from({ length: mw }, (_, i) => {
    const bw = r.bp.wks[i], ow = r.op.wks[i];
    return {
      bpBen: bw ? bw.b : 0, bpTu: bw ? bw.tu : 0, bpType: bw ? bw.t : null,

      get total() { return this.bpBen + this.bpTu + this.opBen + this.opTu; },
    };
  });

              const totalH = (w.total / maxVal) * 100;
              const bpBenH = (w.bpBen / maxVal) * 100;
              const bpTuH = (w.bpTu / maxVal) * 100;

                      <div style={{ fontWeight: 700, marginBottom: 2 }}>Week {i + 1}{w.bpType ? ` \u2014 ${w.bpType}` : (w.opType ? ` \u2014 ${w.opType}` : "")}</div>

                      {w.opBen > 0 && <div>Other EI: {fmt(w.opBen)}</div>}
                      {w.opTu > 0 && <div>Other top-up: {fmt(w.opTu)}</div>}
                      <div style={{ borderTop: "1px solid #5c4f44", marginTop: 3, paddingTop: 3, fontWeight: 700 }}>Total: {fmt(w.total)}</div>

          </div>

          {/* X-axis labels */}
          <div style={{ display: "flex", marginTop: 3 }}>
            {weeks.map((_, i) => (
              (i === 0 || (i + 1) % 5 === 0) ? (
                <div key={i} style={{ position: "absolute", left: `${(i / mw) * 100}%`, fontSize: 9, color: "#b0a594" }}>{i + 1}</div>
              ) : null
            ))}
          </div>
        </div>
      </div>

      {/* Legend */}
      <div style={{ display: "flex", gap: 14, justifyContent: "center", marginTop: 14, flexWrap: "wrap" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: "#7a6e62" }}><div style={{ width: 10, height: 10, borderRadius: 2, background: "#c27840" }} /> Birthing EI/QPIP</div>
        {r.bp.top > 0 && <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: "#7a6e62" }}><div style={{ width: 10, height: 10, borderRadius: 2, background: "#e0a872" }} /> Birthing top-up</div>}
        <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: "#7a6e62" }}><div style={{ width: 10, height: 10, borderRadius: 2, background: "#5a8f6e" }} /> Other EI/QPIP</div>

        {weeklySalary && <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: "#c05050" }}><div style={{ width: 12, height: 0, borderBottom: "2px dashed #c05050" }} /> Combined salary</div>}
      </div>
    </div>
  );

    body: `If you're self-employed in Canada and planning to have a child, you can access EI maternity and parental benefits \u2014 but the rules are fundamentally different from employed workers. The 12-month planning window is critical. [1]

**Reporting income during your benefit period.** If you earn self-employment income while receiving benefits, you must report it. Transactions are allocated to the weeks when the work was performed, not when payment is received. For example, if a real estate agent closes a sale that was listed before leave, the commission is allocated to the pre-leave work period. [2]

            {/* ── RESULTS ── */}

                  {bpPW > 0 && opPW > 0 && <p style={{ marginBottom: 10 }}><strong>Sharing bonus:</strong> You've unlocked {isQ ? (qPlan === "basic" ? "4" : "3") : (type === "standard" ? "5" : "8")} extra weeks because both parents are taking leave{!isQ && <> (<a href={REFS.ei_digest.u} target="_blank" rel="noopener noreferrer" style={{ fontSize: 11, color: "#a0937f" }}>Canada.ca Digest</a>)</>}. These are use-it-or-lose-it.</p>}
                  {(bp.selfEmp || op.selfEmp) && <p style={{ marginBottom: 10 }}><strong>Self-employed:</strong> {isQ ? <>QPIP covers self-employed automatically with $2,000+ earnings (<a href={REFS.qpip.u} target="_blank" rel="noopener noreferrer" style={{ fontSize: 11, color: "#a0937f" }}>QPIP</a>).</> : <>Must opt into EI special benefits 12+ months before claiming. Need $8,826+ in prior-year net earnings. Benefits based on prior calendar year. Once you receive benefits, opt-out is not possible (<a href={REFS.ei_self.u} target="_blank" rel="noopener noreferrer" style={{ fontSize: 11, color: "#a0937f" }}>Canada.ca</a>; <a href={REFS.cfib.u} target="_blank" rel="noopener noreferrer" style={{ fontSize: 11, color: "#a0937f" }}>CFIB</a>). A full 50 weeks of benefits covers ~30 years of premiums.</>}</p>}
                </div>
              </div>

              {/* ── NEXT STEPS: Contextual partner recommendations ── */}
              <div style={{ marginTop: 24, marginBottom: 20 }}>
                <h3 style={{ fontFamily: "var(--fd)", fontSize: 17, marginBottom: 6 }}>{"\uD83D\uDCCB"} Your Next Steps</h3>
                <p style={{ fontSize: 12, color: "#a0937f", marginBottom: 14 }}>Based on your results, here are actions to consider. <em>Some links below are from partners who help keep Parental Leave Calculator free.</em></p>

                  {/* Return to work / career — always show */}
                  <div style={{ background: "linear-gradient(135deg, #f0f7f3, #f8fcf9)", border: "1px solid #c8ddd0", borderRadius: 14, padding: "18px 20px" }}>
                    <div style={{ fontSize: 20, marginBottom: 6 }}>{"\uD83D\uDE80"}</div>
                    <h4 style={{ fontFamily: "var(--fd)", fontSize: 15, margin: "0 0 6px", color: "#2d2520" }}>Plan your return to work</h4>

              }} onMouseOver={e => e.currentTarget.style.boxShadow = "0 4px 20px #c2784015"} onMouseOut={e => e.currentTarget.style.boxShadow = "none"}>

                  <span style={S.badge(a.tagColor)}>{a.tag}</span>

            ))}

      )}

      {page === "about" && (
        <div style={{ maxWidth: 640, margin: "0 auto", padding: "48px 20px 60px" }}>
          <h1 style={{ fontFamily: "var(--fd)", fontSize: 32, marginBottom: 16 }}>About Parental Leave Calculator</h1>
          <div style={{ fontSize: 15, lineHeight: 1.8, color: "#4a3f35" }}>
            <p style={{ marginBottom: 16 }}>Canadian parental leave is generous by global standards {"\u2014"} but it's also confusing. Between federal EI rules, provincial job-protection differences, employer top-ups, the standard vs. extended choice, and Quebec's entirely separate QPIP system, most families make this decision with incomplete information.</p>
            <p style={{ marginBottom: 16 }}>Parental Leave Calculator was built to change that. It models the real financial impact of different leave-splitting scenarios, factoring in each parent's salary, their employer's top-up policies (including separate maternity vs. parental top-ups), and the sharing bonus incentive. It then gives you personalized recommendations based on your specific situation {"\u2014"} like when the lower-earning parent should take more weeks, or when a top-up mismatch means one parent's leave costs the family less.</p>
            <p style={{ marginBottom: 16 }}>All calculations use 2026 federal EI maximums ($68,900 MIE, $729/week standard, $437/week extended) and Quebec QPIP rates ($103,000 MIE). The one-week EI waiting period is currently waived for claims starting before April 11, 2026.</p>
            <p style={{ marginBottom: 16 }}>This tool is for planning purposes only. Always verify your eligibility and benefit amounts with Service Canada, your employer's HR department, and a qualified financial advisor.</p>
            <h2 style={{ fontFamily: "var(--fd)", fontSize: 22, marginTop: 32, marginBottom: 12 }}>Key Statistics</h2>
            <p style={{ marginBottom: 12 }}>In 2023{"\u2013"}24, Ontario accounted for about 52% of all EI maternity payments nationally. About 92.8% of mothers received the full 15 weeks of maternity benefits available. Meanwhile, only about 11% of fathers outside Quebec take any parental leave at all {"\u2014"} compared to 85% of fathers in Quebec, where dedicated paternity weeks exist.</p>
            <p>The cost of raising a child from birth to age 17 averages $362,000 for a middle-income Canadian family. Getting your parental leave finances right is one of the most impactful financial decisions you'll make as a new parent.</p>
          </div>
        </div>
      )}

      <footer style={{ borderTop: "1px solid #e6dfd6", padding: "20px 24px", textAlign: "center", fontSize: 12, color: "#a0937f" }}>
        <p>Parental Leave Calculator {"\u00B7"} 2026 EI & QPIP Rules {"\u00B7"} Not financial advice {"\u00B7"} <a href="https://www.canada.ca/en/services/benefits/ei/ei-maternity-parental.html" target="_blank" rel="noopener noreferrer" style={{ color: "#9a8d80" }}>Verify with Service Canada</a></p>
      </footer>
    </Shell>
  );
}

      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Source+Sans+3:wght@300;400;500;600;700;800&display=swap');
        :root { --fd: 'DM Serif Display', Georgia, serif; --fb: 'Source Sans 3', system-ui, sans-serif; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { overflow-x: hidden; }
        body { font-family: var(--fb); background: #faf7f3; color: #2d2520; }
        input[type=range] { height: 5px; border-radius: 3px; cursor: pointer; }
        ::selection { background: #c2784033; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fi { animation: fadeIn 0.3s ease forwards; }
      `}</style>
      <div style={{ minHeight: "100vh", background: "#faf7f3" }}>
        {/* Nav */}
        <nav style={{ background: "#fff", borderBottom: "1px solid #e6dfd6", position: "sticky", top: 0, zIndex: 100 }}>
          <div style={{ maxWidth: 960, margin: "0 auto", padding: "0 20px", display: "flex", alignItems: "center", justifyContent: "space-between", height: 56 }}>
            <button onClick={() => setPage("calc")} style={{ background: "none", border: "none", cursor: "pointer", display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 20 }}>{"\uD83C\uDF3F"}</span>
              <span style={{ fontFamily: "var(--fd)", fontSize: 18, color: "#2d2520" }}>Parental Leave Calculator</span>
            </button>
            {/* Desktop nav */}
            <div style={{ display: "flex", gap: 4 }}>
              {navItems.map(n => (
                <button key={n.k} onClick={() => setPage(n.k)} style={{
                  background: page === n.k ? "#f5ede3" : "transparent", border: "none", padding: "8px 16px",
                  borderRadius: 8, cursor: "pointer", fontSize: 14, fontWeight: page === n.k ? 700 : 500,
                  color: page === n.k ? "#c27840" : "#7a6e62", fontFamily: "inherit",
                  transition: "all 0.15s",
                }}>
                  {n.l}
                </button>
              ))}
            </div>
          </div>
        </nav>
        {children}
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
    </script>
</body>
